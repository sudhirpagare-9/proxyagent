<!DOCTYPE html>
<html>
<body>
    <h1>Client Access Control</h1>
    <table>
        <thead><tr><th>HW ID</th><th>Hostname</th><th>Country</th><th>IP</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="clientBody"></tbody>
    </table>

    <script>
        async function loadClients() {
            const res = await fetch('/api/get-clients');
            const clients = await res.json();
            document.getElementById('clientBody').innerHTML = clients.map(c => `
                <tr>
                    <td>${c.hw_id}</td><td>${c.hostname}</td><td>${c.country}</td><td>${c.ip_address}</td><td>${c.status}</td>
                    <td>
                        <button onclick="updateStatus('${c.hw_id}', 'approved')">Approve</button>
                        <button onclick="updateStatus('${c.hw_id}', 'denied')">Deny</button>
                    </td>
                </tr>`).join('');
        }

        async function updateStatus(hwId, status) {
            await fetch(`/api/update-status/${hwId}/${status}`, { method: 'POST' });
            loadClients();
        }
        loadClients();
    </script>
</body>
</html>
