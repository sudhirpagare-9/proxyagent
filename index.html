<!DOCTYPE html>
<html class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen p-6">
    <h1 class="text-3xl font-bold mb-6 border-b border-gray-700 pb-4">Security Operations Center</h1>
    
    <section class="mb-10">
        <h2 class="text-xl font-semibold mb-4 text-blue-400">1. Client Machine Registry</h2>
        <div class="bg-gray-800 rounded-lg p-4 overflow-x-auto border border-gray-700">
            <table class="w-full text-sm text-left">
                <thead class="text-gray-400 border-b border-gray-700">
                    <tr>
                        <th class="p-2">HW ID</th><th class="p-2">Hostname</th>
                        <th class="p-2">IP</th><th class="p-2">Status</th><th class="p-2">Action</th>
                    </tr>
                </thead>
                <tbody id="client-body"></tbody>
            </table>
        </div>
    </section>

    <script>
        async function updateStatus(hw_id, status) {
            await fetch(`/api/update-status/${hw_id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: status})
            });
            fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/get-data');
                const data = await res.json();
                
                const tbody = document.getElementById('client-body');

                if (!data.clients || data.clients.length === 0) {
                    tbody.innerHTML = `<tr>
                        <td colspan="5" class="p-8 text-center text-gray-500">
                            <div class="animate-pulse">Waiting for proxy traffic...</div>
                            <p class="text-xs mt-2">The system will automatically register clients upon first traffic intercept.</p>
                        </td>
                    </tr>`;
                    return;
                }

                tbody.innerHTML = data.clients.map(c => `
                    <tr class="border-b border-gray-700">
                        <td class="p-2">${c.hw_id || 'N/A'}</td>
                        <td class="p-2">${c.hostname || 'N/A'}</td>
                        <td class="p-2">${c.ip_address || 'N/A'}</td>
                        <td class="p-2 font-bold ${c.status === 'APPROVED' ? 'text-green-500' : 'text-red-500'}">${c.status || 'PENDING'}</td>
                        <td class="p-2 space-x-2">
                            <button onclick="updateStatus('${c.hw_id}', 'APPROVED')" class="bg-green-700 px-3 py-1 rounded text-xs">Approve</button>
                            <button onclick="updateStatus('${c.hw_id}', 'DENIED')" class="bg-red-700 px-3 py-1 rounded text-xs">Deny</button>
                        </td>
                    </tr>`).join('');
            } catch (err) {
                console.error("Error:", err);
            }
        }
        // Refresh every 5 seconds to show new registrations automatically
        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
