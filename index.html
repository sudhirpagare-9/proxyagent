<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-2xl mb-4">AI Proxy Management</h1>
    <table class="w-full bg-gray-800 rounded border border-gray-700">
        <thead>
            <tr class="text-left">
                <th class="p-2">HW ID</th>
                <th class="p-2">Status</th>
                <th class="p-2">Action</th>
            </tr>
        </thead>
        <tbody id="clientBody"><tr><td colspan="3" class="p-4">Loading...</td></tr></tbody>
    </table>

    <script>
        const API_URL = window.location.origin;

        // Function to retrieve the API key from sessionStorage or prompt the user
        function getApiKey() {
            let key = sessionStorage.getItem('api_key');
            if (!key) {
                key = prompt("Please enter your API Key to access the dashboard:");
                if (key) {
                    sessionStorage.setItem('api_key', key);
                }
            }
            return key;
        }

        async function loadClients() {
            const secret = getApiKey();
            if (!secret) {
                document.getElementById('clientBody').innerHTML = '<tr><td colspan="3" class="p-4 text-red-500">Access Denied: API Key required.</td></tr>';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/clients`, { 
                    headers: {'api-key': secret} 
                });
                
                if (!res.ok) throw new Error("Unauthorized");

                const result = await res.json();
                const body = document.getElementById('clientBody');
                body.innerHTML = '';
                
                result.data.forEach(client => {
                    const nextStatus = (client.status === 'approved') ? 'pending' : 'approved';
                    body.innerHTML += `<tr>
                        <td class="p-2 border">${client.hw_id}</td>
                        <td class="p-2 border">${client.status}</td>
                        <td class="p-2 border">
                            <button onclick="toggle('${client.hw_id}', '${nextStatus}')" class="bg-blue-600 px-3 py-1 rounded">
                                Toggle to ${nextStatus}
                            </button>
                        </td>
                    </tr>`;
                });
            } catch (e) { 
                console.error("Fetch failed:", e);
                // Clear key if it was invalid
                sessionStorage.removeItem('api_key');
                document.getElementById('clientBody').innerHTML = '<tr><td colspan="3" class="p-4 text-red-500">Failed to load data. Refresh page to try again.</td></tr>';
            }
        }

        async function toggle(hw_id, newStatus) {
            const secret = getApiKey();
            if (!secret) return;

            await fetch(`${API_URL}/toggle-status`, {
                method: 'POST',
                headers: {'api-key': secret, 'Content-Type': 'application/json'},
                body: JSON.stringify({hw_id: hw_id, status: newStatus})
            });
            loadClients();
        }

        loadClients();
    </script>
</body>
</html>
