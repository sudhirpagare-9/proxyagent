<!DOCTYPE html>
<html>
<body>
    <h1>AI Proxy Management</h1>
    <table id="clientTable" border="1">
        <thead><tr><th>HW ID</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="clientBody"></tbody>
    </table>

    <script>
        const API_URL = "https://your-api-url.onrender.com"; // Your deployed backend URL
        const SECRET = "my_secure_random_key_123";           // Must match the one in Backend Env Vars

        async function loadClients() {
            const res = await fetch(`${API_URL}/clients`, { headers: {'api-key': SECRET} });
            const result = await res.json();
            const body = document.getElementById('clientBody');
            body.innerHTML = '';
            
            result.data.forEach(client => {
                body.innerHTML += `<tr>
                    <td>${client.hw_id}</td>
                    <td>${client.status}</td>
                    <td><button onclick="toggle('${client.hw_id}', '${client.status}')">Toggle</button></td>
                </tr>`;
            });
        }

        async function toggle(hw_id, currentStatus) {
            const newStatus = (currentStatus === 'approved') ? 'pending' : 'approved';
            await fetch(`${API_URL}/toggle-status`, {
                method: 'POST',
                headers: {'api-key': SECRET, 'Content-Type': 'application/json'},
                body: JSON.stringify({hw_id: hw_id, status: newStatus})
            });
            loadClients();
        }
        loadClients();
    </script>
</body>
</html>
