<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Secure Proxy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Client Access Control</h1>
        <div class="bg-slate-900 border border-slate-800 rounded-lg p-6 mb-8">
            <table class="w-full text-left">
                <thead class="text-slate-400 text-xs uppercase">
                    <tr><th class="pb-4">Hostname</th><th class="pb-4">HW ID</th><th class="pb-4">Status</th><th class="pb-4">Actions</th></tr>
                </thead>
                <tbody id="clientTableBody" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>

        <div id="logSection" class="hidden">
            <h2 id="logTitle" class="text-xl font-bold mb-4">Intercepted Traffic</h2>
            <div class="bg-slate-900 border border-slate-800 rounded-lg p-6">
                <table class="w-full text-left">
                    <thead class="text-slate-400 text-xs uppercase">
                        <tr><th class="pb-4">Model</th><th class="pb-4">Input</th><th class="pb-4">Output</th></tr>
                    </thead>
                    <tbody id="logBody" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentHwId = null;

        async function loadClients() {
            const res = await fetch('/api/get-clients');
            const clients = await res.json();
            document.getElementById('clientTableBody').innerHTML = clients.map(c => `
                <tr class="hover:bg-slate-800 cursor-pointer" onclick="selectClient('${c.hw_id}', '${c.hostname}')">
                    <td class="py-4">${c.hostname}</td>
                    <td class="py-4 text-slate-500">${c.hw_id}</td>
                    <td class="py-4">${c.status}</td>
                    <td class="py-4">
                        <button onclick="event.stopPropagation(); updateStatus('${c.hw_id}', 'approved')" class="bg-emerald-600 px-2 py-1 rounded text-xs mr-2">Approve</button>
                        <button onclick="event.stopPropagation(); updateStatus('${c.hw_id}', 'denied')" class="bg-red-600 px-2 py-1 rounded text-xs">Deny</button>
                    </td>
                </tr>`).join('');
        }

        async function selectClient(hwId, hostname) {
            currentHwId = hwId;
            document.getElementById('logSection').classList.remove('hidden');
            document.getElementById('logTitle').innerText = `Traffic for: ${hostname}`;
            const res = await fetch(`/api/get-logs/${hwId}`);
            const logs = await res.json();
            document.getElementById('logBody').innerHTML = logs.length > 0 ? logs.map(l => `
                <tr class="text-sm">
                    <td class="py-3">${l.model_name}</td>
                    <td class="py-3 text-slate-400">${l.input_tokens}</td>
                    <td class="py-3 text-slate-400">${l.output_tokens}</td>
                </tr>`).join('') : '<tr><td colspan="3" class="py-4 text-center">No logs found.</td></tr>';
        }

        async function updateStatus(hwId, status) {
            await fetch(`/api/status/${hwId}/${status}`, { method: 'POST' });
            loadClients();
        }

        loadClients();
    </script>
</body>
</html>
