<!DOCTYPE html>
<html class="dark">
<body class="bg-gray-900 text-white p-10">
    <h2 class="text-2xl mb-5">Client Access Control</h2>
    <table class="w-full bg-gray-800 rounded">
        <thead><tr class="text-left"><th class="p-3">HW ID</th><th>Hostname</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="clients"></tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = supabase.createClient('URL', 'KEY');
        async function fetchClients() {
            const { data } = await sb.from('clients_registry').select('*');
            document.getElementById('clients').innerHTML = data.map(c => `
                <tr><td class="p-3">${c.hw_id}</td><td>${c.hostname}</td><td>${c.status}</td>
                <td><button onclick="update('${c.hw_id}', '${c.status}')" class="bg-blue-600 px-3 py-1 rounded">
                ${c.status === 'approved' ? 'Deny' : 'Approve'}</button></td></tr>`).join('');
        }
        async function update(id, cur) {
            await sb.from('clients_registry').update({status: cur === 'approved' ? 'pending' : 'approved'}).eq('hw_id', id);
            fetchClients();
        }
        fetchClients();
    </script>
</body>
</html>
