<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Proxy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex">

    <div class="w-1/4 bg-white border-r h-full overflow-y-auto p-4">
        <h2 class="text-xl font-bold mb-4">Clients</h2>
        <div id="client-list" class="space-y-2"></div>
    </div>

    <div class="flex-1 p-6 overflow-hidden flex flex-col">
        <h2 class="text-2xl font-bold mb-4" id="log-title">Select a Client</h2>
        
        <div class="bg-white rounded-lg shadow border flex-1 overflow-hidden flex flex-col">
            <div class="overflow-y-auto max-h-[70vh]">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 border-b">
                        <tr>
                            <th class="p-3">Model</th><th>Ver</th><th>Level</th><th>In</th><th>Out</th><th>Balance</th><th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="log-body" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let selectedHwId = null;

        // Fetch Clients
        async function loadClients() {
            const res = await fetch('/api/get-clients');
            const data = await res.json();
            const list = document.getElementById('client-list');
            list.innerHTML = data.map(c => `
                <div class="p-3 border rounded cursor-pointer hover:bg-blue-50 ${c.status === 'approved' ? 'border-l-4 border-l-green-500' : 'border-l-4 border-l-yellow-500'}" 
                     onclick="selectClient('${c.hw_id}')">
                    <div class="font-bold">${c.hostname}</div>
                    <div class="text-xs text-gray-500">${c.hw_id}</div>
                    ${c.status !== 'approved' ? `<button onclick="event.stopPropagation(); approve('${c.hw_id}')" class="mt-2 text-xs bg-green-500 text-white px-2 py-1 rounded">Approve</button>` : ''}
                </div>
            `).join('');
        }

        // Handle Approval
        async function approve(hw_id) {
            await fetch(`/api/approve-client/${hw_id}`, { method: 'POST' });
            loadClients();
        }

        // Handle Selection
        async function selectClient(hw_id) {
            selectedHwId = hw_id;
            document.getElementById('log-title').innerText = `Traffic Logs: ${hw_id}`;
            const res = await fetch(`/api/get-logs/${hw_id}`);
            const logs = await res.json();
            const body = document.getElementById('log-body');
            body.innerHTML = logs.map(l => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3">${l.model_name}</td>
                    <td>${l.version_name || '-'}</td>
                    <td>${l.thinking_level || '-'}</td>
                    <td>${l.input_tokens}</td>
                    <td>${l.output_tokens}</td>
                    <td>${l.balance || 0}</td>
                    <td>${new Date(l.created_at).toLocaleTimeString()}</td>
                </tr>
            `).join('');
        }

        loadClients();
        setInterval(loadClients, 5000);
    </script>
</body>
</html>
