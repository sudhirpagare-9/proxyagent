<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen flex">
    <div class="w-80 bg-white border-r flex flex-col h-full">
        <div class="p-4 border-b font-bold text-slate-700 text-lg">Client Registry</div>
        <div id="client-list" class="flex-1 overflow-y-auto p-2 space-y-2">
            </div>
    </div>

    <div class="flex-1 flex flex-col p-6 overflow-hidden">
        <div id="details-card" class="bg-white p-6 rounded-lg border shadow-sm mb-6 hidden">
            <h2 id="d-hostname" class="text-2xl font-bold mb-4">Select a Client</h2>
            <div class="grid grid-cols-4 gap-4 text-sm mb-6">
                <div><p class="text-gray-400">HW ID</p><p id="d-hwid">-</p></div>
                <div><p class="text-gray-400">IP</p><p id="d-ip">-</p></div>
                <div><p class="text-gray-400">Status</p><span id="d-status" class="px-2 py-1 rounded text-xs font-bold"></span></div>
                <div id="btn-container" class="flex gap-2"></div>
            </div>
        </div>

        <div class="flex-1 bg-white rounded-lg border shadow-sm overflow-hidden flex flex-col">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-50 border-b text-slate-600 uppercase text-xs">
                    <tr>
                        <th class="p-4">Model</th><th class="p-4">Input</th>
                        <th class="p-4">Output</th><th class="p-4">Balance</th><th class="p-4">Time</th>
                    </tr>
                </thead>
                <tbody id="log-body" class="divide-y text-slate-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadClients() {
            const res = await fetch('/api/clients');
            const data = await res.json();
            document.getElementById('client-list').innerHTML = data.map(c => `
                <div onclick="selectClient('${c.hw_id}', '${c.hostname}', '${c.ip_address}', '${c.status}')" 
                     class="p-3 border rounded cursor-pointer hover:bg-slate-50">
                    <div class="font-bold text-sm">${c.hostname}</div>
                    <div class="text-xs text-slate-400">${c.hw_id.substring(0,8)}...</div>
                </div>`).join('');
        }

        async function selectClient(hwid, host, ip, status) {
			document.getElementById('details-card').classList.remove('hidden');
            document.getElementById('d-hostname').innerText = host;
            document.getElementById('d-hwid').innerText = hwid;
            document.getElementById('d-ip').innerText = ip;
         	  
            const badge = document.getElementById('d-status');
            badge.innerText = status.toUpperCase();
            badge.className = status === 'approved' ? 'bg-green-100 text-green-700 px-2 py-1 rounded text-xs' : 'bg-red-100 text-red-700 px-2 py-1 rounded text-xs';

            document.getElementById('btn-container').innerHTML = `
                <button class="bg-blue-600 text-white px-3 py-1 rounded" onclick="updateStatus('${hwid}', 'approved')">Approve</button>
                <button class="bg-gray-200 text-slate-600 px-3 py-1 rounded" onclick="updateStatus('${hwid}', 'denied')">Deny</button>`;

           try {
        const response = await fetch(`/api/logs/${hwid}`);
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        
        const logs = await response.json();
        
        if (logs.length === 0) {
            document.getElementById('log-body').innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-400">No logs found</td></tr>';
        } else {
            document.getElementById('log-body').innerHTML = logs.map(l => `
                <tr>
                    <td class="p-4">${l.model_name || 'N/A'}</td>
                    <td class="p-4">${l.input_tokens || 0}</td>
                    <td class="p-4">${l.output_tokens || 0}</td>
                    <td class="p-4">${new Date(l.created_at).toLocaleTimeString()}</td>
                </tr>
            `).join('');
        }
    } catch (e) {
        console.error("Fetch Error:", e);
        document.getElementById('log-body').innerHTML = `<tr><td colspan="4" class="p-4 text-red-500">Error loading logs: ${e.message}</td></tr>`;
    }
        async function updateStatus(hwid, status) {
            await fetch(`/api/status/${hwid}/${status}`, {method: 'POST'});
            loadClients();
            selectClient(hwid, document.getElementById('d-hostname').innerText, document.getElementById('d-ip').innerText, status);
        }

        loadClients();
    </script>
</body>
</html>
