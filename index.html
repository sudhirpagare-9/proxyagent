<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn { padding: 6px 10px; cursor: pointer; margin-right: 5px; }
    </style>
</head>
<body>
    <h1>Client Dashboard</h1>
    <table id="clientTable">
        <thead>
            <tr>
                <th>HW ID</th><th>Hostname</th><th>IP</th><th>MAC</th><th>Country</th><th>Status</th><th>Actions</th>
            </tr>
        </thead>
        <tbody id="clientBody"></tbody>
    </table>

    <script>
        async function loadClients() {
            const res = await fetch('/api/get-clients');
            const clients = await res.json();
            document.getElementById('clientBody').innerHTML = clients.map(c => `
                <tr>
                    <td>${c.hw_id}</td><td>${c.hostname}</td><td>${c.ip_address}</td>
                    <td>${c.mac_address}</td><td>${c.country}</td><td>${c.status}</td>
                    <td>
                        ${c.status !== 'approved' ? `<button class="btn" onclick="approveClient('${c.hw_id}')">Approve</button>` : 'Approved'}
                        <button class="btn" onclick="viewLogs('${c.hw_id}')">View Logs</button>
                    </td>
                </tr>`).join('');
        }

        async function approveClient(hwId) {
            await fetch(`/api/approve/${hwId}`, { method: 'POST' });
            loadClients();
        }

        function viewLogs(hwId) {
            // Placeholder for your existing log viewing logic
            alert("Viewing logs for: " + hwId);
        }
        
        loadClients();
    </script>
</body>
</html>
