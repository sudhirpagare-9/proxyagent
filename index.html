<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="col-span-1 bg-white rounded-xl shadow p-4">
            <h2 class="font-bold mb-4">Clients</h2>
            <div id="client-list" class="space-y-2"></div>
        </div>
        <div class="col-span-3">
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50"><tr><th class="p-4">Model</th><th class="p-4">Input</th><th class="p-4">Output</th></tr></thead>
                    <tbody id="log-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        async function loadClients() {
            const res = await fetch('/api/clients');
            const data = await res.json();
            document.getElementById('client-list').innerHTML = data.map(c => `
                <div class="p-2 border rounded cursor-pointer hover:bg-gray-50" onclick="loadLogs('${c.hw_id}')">
                    ${c.hostname}
                </div>`).join('');
        }
        async function loadLogs(hwid) {
            const res = await fetch(`/api/logs/${hwid}`);
            const logs = await res.json();
            document.getElementById('log-body').innerHTML = logs.map(l => `
                <tr><td class="p-4">${l.model_name}</td><td class="p-4">${l.input_tokens}</td><td class="p-4">${l.output_tokens}</td></tr>
            `).join('');
        }
        loadClients();
    </script>
</body>
</html>
