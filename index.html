<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Access Control</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .error { color: red; }
    </style>
</head>
<body>

    <h1>Client Access Control</h1>
    <table id="client-table">
        <thead>
            <tr>
                <th>HW ID</th>
                <th>Hostname</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="client-table-body">
            </tbody>
    </table>

    <script>
        async function loadClients() {
            const tableBody = document.getElementById('client-table-body');
            
            try {
                // Fetching from your own secure backend
                const response = await fetch('/api/get-clients');
                
                if (!response.ok) throw new Error('Failed to fetch data');
                
                const clients = await response.json();
                
                tableBody.innerHTML = ''; // Clear existing
                
                clients.forEach(client => {
                    const row = `<tr>
                        <td>${client.hw_id}</td>
                        <td>${client.hostname}</td>
                        <td>${client.status}</td>
                        <td><button onclick="updateStatus('${client.hw_id}', 'approved')">Approve</button></td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error:", error);
                tableBody.innerHTML = `<tr><td colspan="4" class="error">Failed to load clients.</td></tr>`;
            }
        }

        async function updateStatus(hw_id, status) {
            // Future implementation for admin actions
            alert("Update logic to be added for: " + hw_id);
        }

        // Load data when page opens
        loadClients();
    </script>
</body>
</html>
