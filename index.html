<!DOCTYPE html>
<html class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">
    <h1 class="text-3xl font-bold mb-8">Security Operations Center</h1>
    
    <!-- Section 1: Client Devices -->
    <section class="mb-12">
        <h2 class="text-xl font-semibold mb-4 text-blue-400">1. Client Machine Registry</h2>
        <div class="overflow-x-auto bg-gray-800 rounded-lg p-4">
            <table class="w-full text-sm">
                <thead class="text-gray-400 border-b border-gray-700">
                    <tr><th class="p-3">HW ID</th><th class="p-3">Hostname</th><th class="p-3">IP</th><th class="p-3">Status</th><th class="p-3">Action</th></tr>
                </thead>
                <tbody id="client-body"></tbody>
            </table>
        </div>
    </section>

    <!-- Section 2: AI Traffic Logs -->
    <section>
        <h2 class="text-xl font-semibold mb-4 text-green-400">2. Proxy Intercepted Traffic</h2>
        <div class="overflow-x-auto bg-gray-800 rounded-lg p-4">
            <table class="w-full text-sm">
                <thead class="text-gray-400 border-b border-gray-700">
                    <tr><th class="p-3">Time</th><th class="p-3">Hostname</th><th class="p-3">Model</th><th class="p-3">Tokens (In/Out)</th><th class="p-3">Sub</th></tr>
                </thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>
    </section>

    <script>
        async function fetchData() {
            const res = await fetch('/api/get-data');
            const data = await res.json();
            
            // Populate Clients
            document.getElementById('client-body').innerHTML = data.clients.map(c => `
                <tr class="border-b border-gray-700">
                    <td class="p-3">${c.hw_id}</td>
                    <td class="p-3">${c.hostname}</td>
                    <td class="p-3">${c.ip_address}</td>
                    <td class="p-3"><span class="${c.status === 'approved' ? 'text-green-500' : 'text-red-500'}">${c.status}</span></td>
                    <td class="p-3">
                        <button onclick="updateStatus('${c.hw_id}', 'approved')" class="bg-green-600 px-2 py-1 rounded text-xs">Approve</button>
                    </td>
                </tr>`).join('');
            
            // Populate Logs
            document.getElementById('log-body').innerHTML = data.logs.map(l => `
                <tr class="border-b border-gray-700">
                    <td class="p-3 text-xs">${new Date(l.created_at).toLocaleTimeString()}</td>
                    <td class="p-3">${l.hostname}</td>
                    <td class="p-3">${l.model_name}</td>
                    <td class="p-3">${l.input_tokens} / ${l.output_tokens}</td>
                    <td class="p-3">${l.subscription_name}</td>
                </tr>`).join('');
        }
        fetchData();
    </script>
</body>
</html>
