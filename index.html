<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-white mb-6">Client Access Control</h1>
        
        <div class="bg-slate-900 rounded-lg border border-slate-800 p-6 shadow-xl">
            <table class="w-full text-left">
                <thead class="text-slate-400 uppercase text-xs">
                    <tr><th class="pb-4">HW ID</th><th>Hostname</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="clientBody" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadClients() {
            const res = await fetch('/api/get-clients');
            const data = await res.json();
            document.getElementById('clientBody').innerHTML = data.map(c => `
                <tr class="text-sm">
                    <td class="py-4">${c.hw_id}</td>
                    <td class="py-4">${c.hostname}</td>
                    <td class="py-4 text-emerald-400">${c.status}</td>
                    <td class="py-4"><button onclick="approve('${c.hw_id}')" class="bg-indigo-600 px-3 py-1 rounded">Approve</button></td>
                </tr>`).join('');
        }
        
        async function approve(hwId) {
            await fetch(`/api/approve/${hwId}`, { method: 'POST' });
            loadClients();
        }
        loadClients();
    </script>
</body>
</html>
