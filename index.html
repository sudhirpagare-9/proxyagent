<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f7f6; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; }
        th { background-color: #007bff; color: white; }
        .log-box { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Client Access Control</h1>
    <table id="clientTable">
        <thead><tr><th>HW ID</th><th>Hostname</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="clientBody"></tbody>
    </table>

    <div id="logSection" class="log-box">
        <h3>Usage Logs</h3>
        <table id="logTable">
            <thead><tr><th>Model</th><th>Input</th><th>Output</th></tr></thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <script>
        async function loadClients() {
            const res = await fetch('/api/get-clients');
            const clients = await res.json();
            document.getElementById('clientBody').innerHTML = clients.map(c => `
                <tr>
                    <td>${c.hw_id}</td><td>${c.hostname}</td><td>${c.status}</td>
                    <td><button onclick="viewLogs('${c.hw_id}')">View Logs</button></td>
                </tr>`).join('');
        }

        async function viewLogs(hwId) {
            const res = await fetch(`/api/get-logs/${hwId}`);
            const logs = await res.json();
            document.getElementById('logSection').style.display = 'block';
            document.getElementById('logBody').innerHTML = logs.map(l => `
                <tr><td>${l.model_name}</td><td>${l.input_tokens}</td><td>${l.output_tokens}</td></tr>
            `).join('');
        }
        loadClients();
    </script>
</body>
</html>
