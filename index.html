<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Proxy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Proxy Agent Dashboard</h1>
        
        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <h2 class="text-xl font-semibold mb-4">Active Clients</h2>
            <table class="w-full text-left">
                <thead class="border-b">
                    <tr><th class="p-2">HW ID</th><th>Hostname</th><th>IP</th><th>Country</th></tr>
                </thead>
                <tbody id="client-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadClients() {
            const res = await fetch('/api/get-clients');
            const data = await res.json();
            const body = document.getElementById('client-body');
            body.innerHTML = data.map(c => `
                <tr class="border-b">
                    <td class="p-2">${c.hw_id}</td>
                    <td>${c.hostname || 'N/A'}</td>
                    <td>${c.ip_address || 'N/A'}</td>
                    <td>${c.country || 'N/A'}</td>
                </tr>
            `).join('');
        }
        loadClients();
        setInterval(loadClients, 10000); // Refresh every 10 seconds
    </script>
</body>
</html>
