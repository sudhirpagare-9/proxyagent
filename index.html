<!DOCTYPE html>
<html>
<head><title>Secure Dashboard</title></head>
<body>
    <h1>System Status</h1>
    <div id="clientBody"></div>
    <script>
        async function loadData() {
            const res = await fetch('/api/get-clients');
            const data = await res.json();
            document.getElementById('clientBody').innerHTML = JSON.stringify(data);
        }
        loadData();
    </script>
</body>
</html>
